name: Patch & Release NROGame APK

on:
  workflow_dispatch:
    inputs:
      source_version:
        description: 'Version APK gốc từ rem5 (vd: v1.7.0)'
        required: false
        default: 'v1.7.0'
  push:
    branches: [ main ]
    paths: [ 'scripts/**' ]

permissions:
  contents: write

jobs:
  patch:
    name: Patch APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download base APK từ rem5
        run: |
          VERSION="${{ github.event.inputs.source_version || 'v1.7.0' }}"
          echo "Downloading NROGame-bridge.apk ${VERSION}..."
          curl -fL \
            "https://github.com/ksjxjcmxncj-maker/rem5/releases/download/${VERSION}/NROGame-bridge.apk" \
            -o NROGame-bridge-original.apk
          ls -lh NROGame-bridge-original.apk
          echo "APK_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Patch metadata (hardcode 127.0.0.1:14445)
        run: |
          python3 scripts/patch_apk.py \
            NROGame-bridge-original.apk \
            NROGame-bridge-meta.apk \
            "127.0.0.1" \
            "14445"

      - name: Verify metadata patch
        run: |
          python3 - << 'EOF'
          import zipfile
          with zipfile.ZipFile("NROGame-bridge-meta.apk") as z:
              meta = z.read("assets/bin/Data/Managed/Metadata/global-metadata.dat")
          ok1 = b"127.0.0.1" in meta
          ok2 = b"nrofree.online" not in meta
          print(f"127.0.0.1 found: {ok1}")
          print(f"nrofree.online removed: {ok2}")
          if not ok1:
              raise SystemExit("FAIL: metadata patch không thành công")
          print("METADATA PATCH OK")
          EOF

      - name: Setup Android build-tools (zipalign + apksigner)
        run: |
          echo "Android SDK: $ANDROID_HOME"
          BT=$(ls -d "$ANDROID_HOME/build-tools"/* | sort -V | tail -1)
          if [ -z "$BT" ]; then
            yes | sdkmanager "build-tools;35.0.0" > /dev/null
            BT=$(ls -d "$ANDROID_HOME/build-tools"/* | sort -V | tail -1)
          fi
          echo "Build-tools: $BT"
          echo "BUILD_TOOLS=$BT" >> $GITHUB_ENV

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /tmp/apktool.jar
          printf '#!/bin/bash\nexec java -jar /tmp/apktool.jar "$@"\n' > /tmp/apktool
          chmod +x /tmp/apktool
          /tmp/apktool --version

      - name: Decompile APK với apktool (smali)
        run: |
          /tmp/apktool d NROGame-bridge-meta.apk -o /tmp/apk_out -f
          echo "Smali files:"
          find /tmp/apk_out/smali* -name "UnityPlayerActivity.smali" 2>/dev/null

      - name: Patch smali — skip IP dialog (UnitySendMessage)
        run: |
          python3 scripts/patch_dialog.py /tmp/apk_out
          echo "=== NroAutoConnectRunnable ==="
          find /tmp/apk_out -name "NroAutoConnectRunnable.smali" -exec cat {} \;
          echo "=== UnityPlayerActivity (injected section) ==="
          find /tmp/apk_out -name "UnityPlayerActivity.smali" -exec grep -A30 "NRO AUTO-CONNECT" {} \;

      - name: Rebuild APK với apktool
        run: |
          /tmp/apktool b /tmp/apk_out -o NROGame-bridge-unsigned.apk
          ls -lh NROGame-bridge-unsigned.apk

      - name: Sign APK (strip old sigs + zipalign + apksigner v1+v2+v3)
        run: bash scripts/sign_apk.sh NROGame-bridge-unsigned.apk NROGame-bridge-patched.apk

      - name: Verify final APK installability
        run: |
          BT="$BUILD_TOOLS"
          echo "=== Chữ ký ==="
          "$BT/apksigner" verify --verbose NROGame-bridge-patched.apk 2>&1 | grep -E "Verified|v[123] scheme"
          echo "=== Zipalign ==="
          "$BT/zipalign" -c -v 4 NROGame-bridge-patched.apk && echo "ALIGNED OK" || echo "NOT ALIGNED"
          echo "=== Size ==="
          ls -lh NROGame-bridge-patched.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NROGame-patched-${{ github.run_number }}
          path: NROGame-bridge-patched.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: patched-${{ env.APK_VERSION }}-r${{ github.run_number }}
          name: "NRO Patched → 127.0.0.1:14445 (run #${{ github.run_number }})"
          body: |
            ## NROGame APK đã patch — tự động kết nối, không cần nhập IP

            | Field | Value |
            |-------|-------|
            | Base APK | rem5 ${{ env.APK_VERSION }} |
            | Server | `127.0.0.1:14445` |
            | Dialog IP | ✅ Tự động bỏ qua (UnitySendMessage smali patch) |
            | Ký | apksigner v1+v2+v3 |
            | Zipalign | ✅ 4-byte aligned |

            ### Cách dùng
            1. Cài APK lên điện thoại (Android 5.1+)
            2. Chạy `ws_client_proxy.py` trên Codespace
            3. Mở game → sau ~5 giây tự kết nối, **không cần nhập IP**
          files: NROGame-bridge-patched.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
